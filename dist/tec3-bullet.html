<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VD PAC2 (Bullet)</title>
    <script src="./assets/lib/d3.v4.js"></script>
    <script src="./assets/lib/bullet.js"></script>

    <style>
        .bullet { font: 10px sans-serif; }
        .bullet .marker { stroke: #263238; stroke-width: 2px; }
        .bullet .tick line { stroke: #666; stroke-width: .5px; }
        .bullet .range.s0 { fill: #e7e9ec; }
        .bullet .range.s1 { fill: #ddd; }
        .bullet .range.s2 { fill: #ccd1d6; }
        .bullet .range.s3 { fill: #acb4bc; }
        .bullet .measure.s0 { fill: #b0a2e4; }
        .bullet .measure.s1 { fill: #855cf8; }
        .bullet .title { font-size: 14px; font-weight: bold; }
        .bullet .subtitle { fill: #999; }
    </style>

    <script>
        function preparedData(data, year, extract) {
            const prepData = [];

            const minYear = data.reduce((accu, curr) => Math.min(accu, Number(curr['year'])), Number.POSITIVE_INFINITY);
            const maxYear = data.reduce((accu, curr) => Math.max(accu, Number(curr['year'])), Number.NEGATIVE_INFINITY);

            const yearValues = {};
            for (let currentYear = minYear; currentYear <= maxYear; currentYear++) {
                yearValues[currentYear] = {};
                for (let extractData in extract) {
                    const column = extract[extractData].column;
                    yearValues[currentYear][column] = data.filter(d => d['year'] === String(currentYear)).reduce((accu, curr) => accu + Number(curr[column]), 0);
                }
            }
            const yearsList = Object.keys(yearValues);

            for (let extractData in extract) {
                const column = extract[extractData].column;

                const maxValue = yearsList.reduce((accu, curr) => Math.max(accu, yearValues[curr][column]), 0);
                const avgValue = yearsList.reduce((accu, curr) => accu + yearValues[curr][column], 0) / yearsList.length;
                const q1 = yearsList.reduce((accu, curr) => accu.concat(yearValues[curr][column]), []).sort((a, b) => a - b)[Math.floor(yearsList.length * 0.25)];
                const median = yearsList.reduce((accu, curr) => accu.concat(yearValues[curr][column]), []).sort((a, b) => a - b)[Math.floor(yearsList.length * 0.5)];
                const q3 = yearsList.reduce((accu, curr) => accu.concat(yearValues[curr][column]), []).sort((a, b) => a - b)[Math.floor(yearsList.length * 0.75)];
                const value = data.filter(d => d['year'] === String(year)).reduce((accu, curr) => accu + Number(curr[column]), 0);

                prepData.push({
                    title: extract[extractData].title,
                    subtitle: extract[extractData].subtitle,
                    ranges:[q1,median,q3,maxValue],
                    measures:[value],
                    markers:[avgValue]
                })
            }

            return prepData;
        }

        function buildHeatMap(opts, data) {
            var margin = {top: 5, right: 40, bottom: 20, left: 140},
                width = 960 - margin.left - margin.right,
                height = 50 - margin.top - margin.bottom;

            var chart = d3.bullet()
                .width(width)
                .height(height);

            var svg = d3.select(opts.el).selectAll("svg")
                .data(data)
                .enter()
                .append("svg")
                .attr("class", "bullet")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g")
                .attr("transform", "translate(" + margin.left + "," + margin.top + ")")
                .call(chart);

            var title = svg.append("g")
                .style("text-anchor", "end")
                .attr("transform", "translate(-6," + height / 2 + ")");

            title.append("text")
                .attr("class", "title")
                .text(function(d) { return d.title; });

            title.append("text")
                .attr("class", "subtitle")
                .attr("dy", "1em")
                .text(function(d) { return d.subtitle; });
        }

        function updateGraph(data, year) {
            document.querySelector("#my_dataviz").innerHTML = "";
            const prepData = preparedData(
                data,
                year,
                [
                    {"title":"Morts", "subtitle": "Nombre de víctimes mortals", "column": "n_deaths"},
                    {"title":"Ferits greus","subtitle":"Nombre de ferits greus", "column": "n_wounded_severe"},
                    {"title":"Ferits lleus","subtitle":"Nombre de ferits lleus", "column": "n_wounded_mild"},
                    {"title":"Víctimes","subtitle":"Total de víctimes", "column": "n_victims"},
                    {"title":"Vehicles","subtitle":"Nombre de vehicles implicats", "column": "n_vehicles"}
                ]
            )
            buildHeatMap({
                el: "#my_dataviz",
                title: "Accidents per més",
                subtitle: "Accidents registrats a Barcelona per la Guardia Urbana (2010 - 2021)"
            }, prepData)
        }
    </script>
</head>
<body>
    <a href="index.html">Tornar a l'índex</a>
    <h1>TÈCNICA GRUP III (Menys habituals o específiques): Bullet Graphs</h1>
    <!-- Years from 2010 to 2021, default 2021 -->
    <label for="year_sel">Selecció any:</label>
    <select id="year_sel" name="year_sel">
        <option value="2010">2010</option>
        <option value="2011">2011</option>
        <option value="2012">2012</option>
        <option value="2013">2013</option>
        <option value="2014">2014</option>
        <option value="2015">2015</option>
        <option value="2016">2016</option>
        <option value="2017">2017</option>
        <option value="2018">2018</option>
        <option value="2019">2019</option>
        <option value="2020">2020</option>
        <option value="2021" selected>2021</option>
    </select>
    <div id="my_dataviz"></div>

    <script>
        d3.csv('./assets/data/accidents_opendata.csv', function(data) {
            const year = document.getElementsByName("year_sel")[0].value;
            updateGraph(data, year)

            document.getElementsByName("year_sel")[0].addEventListener("change", (event) => {
                const year = event.target.value;
                updateGraph(data, year)
            })
        });
    </script>
</body>
</html>
